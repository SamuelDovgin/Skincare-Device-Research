<svg viewBox="0 0 920 365" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Follicle temperature over time: single pulse vs fast-stacked pulses vs slow-spaced pulses">
<style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
<rect x="0" y="0" width="920" height="365" fill="#ffffff"/>
<text x="60" y="24" font-size="14.5" font-weight="700" fill="#1f2430">Does the heat actually add up? Same total energy, three different flash timings</text>
<text x="60" y="41" font-size="11.5" fill="#6b7280">Illustrative thermal model (not measured device data) — follicle cooling half-life ≈70ms, mid-range of the ~40–100ms literature estimate</text>

<!-- gridlines + y axis -->
<line x1="60" y1="40" x2="60" y2="290" stroke="#d7dade"/>
<g font-size="10" fill="#6b7280" text-anchor="end">
<line x1="60" y1="290" x2="880" y2="290" stroke="#d7dade"/><text x="52" y="293">0</text>
<line x1="60" y1="227.5" x2="880" y2="227.5" stroke="#eef0f2"/><text x="52" y="230.5">25</text>
<line x1="60" y1="165" x2="880" y2="165" stroke="#eef0f2"/><text x="52" y="168">50</text>
<line x1="60" y1="102.5" x2="880" y2="102.5" stroke="#eef0f2"/><text x="52" y="105.5">75</text>
<line x1="60" y1="40" x2="880" y2="40" stroke="#eef0f2"/><text x="52" y="43">100</text>
</g>
<text x="22" y="165" font-size="10.5" fill="#6b7280" text-anchor="middle" transform="rotate(-90 22 165)">relative follicle ΔT (illustrative units)</text>

<!-- x axis -->
<g font-size="10" fill="#6b7280" text-anchor="middle">
<text x="60" y="305">0ms</text>
<text x="255.2" y="305">100ms</text>
<text x="450.5" y="305">200ms</text>
<text x="645.7" y="305">300ms</text>
<text x="841.0" y="305">400ms</text>
</g>
<text x="470" y="320" font-size="10.5" fill="#6b7280" text-anchor="middle">time since first flash</text>

<!-- damage-zone shading for curve B (≈50ms–80ms, the span where it sits above threshold) -->
<rect x="157.6" y="40" width="58" height="87.5" fill="#16a34a" opacity="0.08"/>

<!-- threshold line -->
<line x1="60" y1="127.5" x2="880" y2="127.5" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="884" y="131" font-size="10.5" fill="#c0392b" font-weight="700">damage threshold (illustrative)</text>

<!-- Curve C: slow-spaced pulses (gray, dashed) — drawn first so it sits behind -->
<path d="M 177.1,290.0 L 79.5,290.0 L 79.5,202.5 L 274.8,257.5 L 470.0,277.9 L 470.0,190.4 L 665.2,253.0 L 860.5,276.3 L 860.5,188.8 L 880.0,198.3" fill="none" stroke="#9aa3b2" stroke-width="2.5" stroke-dasharray="2 4" stroke-linejoin="round"/>
<circle cx="79.5" cy="202.5" r="4" fill="#9aa3b2"/>
<circle cx="470.0" cy="190.4" r="4" fill="#9aa3b2"/>
<circle cx="860.5" cy="188.8" r="4" fill="#9aa3b2"/>

<!-- Curve A: single pulse (red/ink, dashed-ish solid reference) -->
<path d="M 177.1,290.0 L 79.5,290.0 L 79.5,65.0 L 118.6,105.4 L 157.6,138.6 L 196.7,165.8 L 235.7,188.1 L 313.8,221.4 L 391.9,243.9 L 470.0,258.9 L 626.2,275.9 L 880.0,286.1" fill="none" stroke="#1f2430" stroke-width="2.5" stroke-linejoin="round" opacity="0.85"/>
<circle cx="79.5" cy="65.0" r="4.5" fill="#1f2430"/>

<!-- Curve B: 3 fast pulses, 20ms apart (green, hero) -->
<path d="M 177.1,290.0 L 79.5,290.0 L 79.5,202.5 L 118.6,218.2 L 118.6,130.7 L 157.6,159.3 L 157.6,71.8 L 196.7,111.0 L 235.7,143.2 L 274.8,169.6 L 352.9,209.0 L 431.0,235.5 L 587.1,265.3 L 880.0,284.4" fill="none" stroke="#16a34a" stroke-width="3" stroke-linejoin="round"/>
<circle cx="79.5" cy="202.5" r="4" fill="#16a34a"/>
<circle cx="118.6" cy="130.7" r="4" fill="#16a34a"/>
<circle cx="157.6" cy="71.8" r="5" fill="#16a34a"/>

<!-- pulse-1 shared guideline -->
<line x1="79.5" y1="40" x2="79.5" y2="290" stroke="#c9ccd2" stroke-width="1" stroke-dasharray="2 3"/>
<text x="79.5" y="50" font-size="9.5" fill="#9aa3b2" text-anchor="middle">flash 1 (all)</text>

<!-- annotations -->
<text x="86" y="60" font-size="10.5" font-weight="700" fill="#1f2430">A — single pulse: peak 90, decays alone</text>
<text x="163" y="64" font-size="10.5" font-weight="700" fill="#16a34a">B — 3 fast flashes (20ms apart): peak 87 ✓ crosses threshold</text>
<text x="200" y="170" font-size="10" fill="#16a34a">2nd flash lands on residual heat from the 1st</text>
<text x="478" y="183" font-size="10.5" font-weight="700" fill="#6b7280">C — 3 slow flashes (200ms apart): peak only ≈40 ✗ never crosses</text>
<text x="478" y="197" font-size="10" fill="#9aa3b2">each flash fully cools before the next arrives — resets, doesn't add</text>

<text x="60" y="345" font-size="11" fill="#1f2430">Same total input energy (3×35 units) in B and C — only the </text>
<text x="60" y="360" font-size="11" fill="#1f2430"><tspan font-weight="700" fill="#16a34a">inter-flash interval</tspan> changes whether it accumulates at the follicle or is wasted.</text>
</svg>
